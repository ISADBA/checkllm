name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-amd64
            goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - platform: darwin-arm64
            goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - platform: linux-amd64
            goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - platform: linux-arm64
            goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - platform: windows-amd64
            goos: windows
            goarch: amd64
            archive_ext: zip
          - platform: windows-arm64
            goos: windows
            goarch: arm64
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate embedded baselines
        run: go generate ./internal/baseline

      - name: Build binary
        run: make build ${{ matrix.platform }}

      - name: Package unix artifact
        if: matrix.archive_ext == 'tar.gz'
        run: |
          mkdir -p release
          tar -C dist/${{ matrix.platform }} -czf \
            release/checkllm_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz \
            checkllm

      - name: Package windows artifact
        if: matrix.archive_ext == 'zip'
        run: |
          mkdir -p release
          cd dist/${{ matrix.platform }}
          zip -q ../../release/checkllm_${{ matrix.goos }}_${{ matrix.goarch }}.zip checkllm.exe

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find release-artifacts -type f -maxdepth 2 -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum * > checksums.txt

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --generate-notes
          gh release upload "$TAG" release-assets/* --clobber
